name: Deploy DEV to EC2
# trigger-note: keep this file in path filters so no-op edits can retrigger DEV deploy safely.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/deploy-dev-ec2.yml"

concurrency:
  group: deploy-dev-ec2
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy DEV (EC2)
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEV_APP_DIR: ${{ vars.DEV_APP_DIR }}
      DEV_COMPOSE_FILE: ${{ vars.DEV_COMPOSE_FILE }}
      DEV_ENV_FILE: ${{ vars.DEV_ENV_FILE }}
    steps:
      - name: Workflow sanity check
        run: echo "Starting DEV deploy run for ${GITHUB_SHA}"

      - name: Deploy code on EC2 DEV host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="${DEV_APP_DIR:-$HOME/apps/advertified-v4-dev}"
            COMPOSE_FILE="${DEV_COMPOSE_FILE:-compose.v4-dev.yml}"
            ENV_FILE="${DEV_ENV_FILE:-.deploy-v4-dev/v4-dev.env}"

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            if [ ! -f "$ENV_FILE" ]; then
              echo "Expected env file '$ENV_FILE' was not found. Aborting deploy."
              exit 1
            fi

            if grep -q "^VITE_ENABLE_PUBLIC_AI_STUDIO=" "$ENV_FILE"; then
              sed -i 's/^VITE_ENABLE_PUBLIC_AI_STUDIO=.*/VITE_ENABLE_PUBLIC_AI_STUDIO=true/' "$ENV_FILE"
            else
              echo "VITE_ENABLE_PUBLIC_AI_STUDIO=true" >> "$ENV_FILE"
            fi

            export APP_ENV_FILE="$ENV_FILE"
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build api web
            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d api web

            # Ensure baseline DEV access accounts exist after each deploy.
            cat database/bootstrap/901_seed_dev_access_accounts.sql | \
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T db sh -lc \
              'PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps
