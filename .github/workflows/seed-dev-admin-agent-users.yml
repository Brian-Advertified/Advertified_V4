name: Seed DEV Admin And Agent Users

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "database/bootstrap/901_seed_dev_access_accounts.sql"
      - ".github/workflows/seed-dev-admin-agent-users.yml"

concurrency:
  group: deploy-dev-ec2
  cancel-in-progress: false

jobs:
  seed-dev-users:
    name: Seed DEV Users
    runs-on: ubuntu-latest
    environment: dev
    env:
      DEV_APP_DIR: ${{ vars.DEV_APP_DIR }}
      DEV_COMPOSE_FILE: ${{ vars.DEV_COMPOSE_FILE }}
      DEV_ENV_FILE: ${{ vars.DEV_ENV_FILE }}
    steps:
      - name: Apply DEV admin and agent user seed
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEV_EC2_HOST }}
          username: ${{ secrets.DEV_EC2_USER }}
          key: ${{ secrets.DEV_EC2_SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="${DEV_APP_DIR:-$HOME/apps/advertified-v4-dev}"
            COMPOSE_FILE="${DEV_COMPOSE_FILE:-compose.v4-dev.yml}"
            ENV_FILE="${DEV_ENV_FILE:-v4-dev.env}"

            cd "$APP_DIR"
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d db

            cat database/bootstrap/901_seed_dev_access_accounts.sql | \
              docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" exec -T db sh -lc \
              'PGPASSWORD="$POSTGRES_PASSWORD" psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB"'

            echo "DEV users seeded/updated successfully."
