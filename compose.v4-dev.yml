name: advertified-v4-dev

services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - v4_dev_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: .deploy-v4-dev/api.Dockerfile
    image: advertified/v4-api:dev
    restart: unless-stopped
    env_file:
      - ${APP_ENV_FILE:-v4-dev.env}
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT}
      ASPNETCORE_URLS: http://0.0.0.0:8080
      ConnectionStrings__Advertified: Host=db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Frontend__BaseUrl: ${FRONTEND_BASE_URL}
      VodaPay__NotificationUrl: ${VODAPAY_NOTIFICATION_URL}
    volumes:
      - v4_dev_api_keys:/root/.aspnet/DataProtection-Keys
    ports:
      - "127.0.0.1:${API_HOST_PORT}:8080"

  web:
    build:
      context: .
      dockerfile: .deploy-v4-dev/web.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAPBOX_ACCESS_TOKEN: ${VITE_MAPBOX_ACCESS_TOKEN}
    image: advertified/v4-web:dev
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "127.0.0.1:${WEB_HOST_PORT}:80"

volumes:
  v4_dev_db_data:
  v4_dev_api_keys:
