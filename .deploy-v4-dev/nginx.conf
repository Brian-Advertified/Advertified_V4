server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Never rewrite hashed build artifacts to index.html.
  location ^~ /assets/ {
    try_files $uri =404;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # Other static files should resolve directly or return 404.
  location ~* \.(?:js|mjs|css|map|ico|png|jpe?g|gif|svg|webp|avif|woff2?|ttf|eot|mp4)$ {
    try_files $uri =404;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  # Always revalidate the HTML entrypoint to avoid stale chunk manifests.
  location = /index.html {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # SPA fallback for real routes only.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
